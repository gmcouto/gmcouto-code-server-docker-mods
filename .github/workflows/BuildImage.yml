name: Build Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true
env:
  IMAGE: ghcr.io/gmcouto/code-server-ai-tools

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Export image as tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: docker save ${{ env.IMAGE }}:${{ github.sha }} | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/image.tar.gz

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag and push release image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${TAG}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${TAG}
          docker push ${{ env.IMAGE }}:latest
          printf "\n## Pushed the following images to GHCR:\n\n" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
